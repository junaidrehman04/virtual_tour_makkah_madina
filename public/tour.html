<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>مکہ مدینہ ورچوئل ٹور | 360°</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/js/pannellum.css">
<script src="/js/pannellum.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#d4a843;--gold2:#f0c970;
  --green:#1a4731;--green2:#2d6b4e;
  --dark:#070e0a;
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Amiri',serif;}

/* ── Pannellum container fills the screen ── */
#panorama-viewer{
  position:fixed;inset:0;
  z-index:1;
}
/* Hide pannellum's own UI — we use our own */
.pnlm-controls-container,
.pnlm-about-msg,
.pnlm-load-button{display:none !important;}

/* ── TOP HUD ── */
#top-hud{
  position:fixed;top:0;left:0;right:0;z-index:30;
  padding:12px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.78),transparent);
  display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;
}
.hud-left{display:flex;align-items:center;gap:10px;}
.hud-badge{
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(8px);border-radius:20px;padding:5px 14px;
  color:#fff;font-size:13px;font-family:monospace;pointer-events:all;
}
.hud-badge em{color:var(--gold2);font-style:normal;}
.hud-title{
  font-family:'Amiri',serif;font-size:1.25rem;
  color:var(--gold2);text-shadow:0 2px 8px rgba(0,0,0,.9);direction:rtl;
}
.hud-right{pointer-events:all;display:flex;gap:8px;}
.hud-btn{
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.75);border-radius:8px;padding:6px 12px;
  cursor:pointer;font-size:13px;backdrop-filter:blur(6px);
  transition:all .2s;text-decoration:none;
}
.hud-btn:hover{background:rgba(255,255,255,.15);color:#fff;}

/* ── INFO CARD (bottom-left) ── */
#info-card{
  position:fixed;bottom:140px;left:16px;z-index:30;
  width:300px;
  background:rgba(5,14,9,.92);
  border:1px solid rgba(212,168,67,.3);
  border-radius:14px;
  backdrop-filter:blur(18px);
  transition:opacity .3s,transform .3s;
}
#info-card.hidden{opacity:0;transform:translateX(-20px);pointer-events:none;}
.ic-header{
  padding:12px 14px 8px;
  border-bottom:1px solid rgba(212,168,67,.15);
  display:flex;justify-content:space-between;align-items:flex-start;
}
.ic-badge{
  display:inline-block;padding:2px 10px;border-radius:20px;
  background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.35);
  color:var(--gold2);font-size:11px;letter-spacing:.07em;font-family:monospace;
}
.ic-toggle{
  background:none;border:none;color:rgba(255,255,255,.4);
  font-size:1rem;cursor:pointer;line-height:1;padding:2px 4px;
}
.ic-toggle:hover{color:#fff;}
.ic-body{padding:10px 14px 12px;}
.ic-icon{font-size:1.6rem;margin-bottom:3px;}
.ic-arabic{
  font-family:'Amiri',serif;font-size:1.2rem;font-weight:700;
  color:var(--gold2);direction:rtl;text-align:right;line-height:1.3;
}
.ic-urdu{
  font-family:'Noto Nastaliq Urdu',serif;font-size:.82rem;
  color:rgba(255,255,255,.72);direction:rtl;text-align:right;
  line-height:1.7;margin-top:4px;
}
.ic-divider{height:1px;background:rgba(212,168,67,.12);margin:8px 0;}
.ic-dua-label{font-size:10px;color:var(--gold);letter-spacing:.08em;font-family:monospace;margin-bottom:3px;}
.ic-dua{
  font-family:'Amiri',serif;font-size:.95rem;color:rgba(255,255,255,.88);
  direction:rtl;text-align:right;line-height:2;
}
.ic-meaning{font-size:.73rem;color:rgba(255,255,255,.42);direction:rtl;text-align:right;line-height:1.6;margin-top:3px;}
.ic-tip{
  margin-top:8px;border-left:2px solid var(--gold);padding:5px 8px;
  font-family:'Noto Nastaliq Urdu',serif;font-size:.76rem;
  color:rgba(255,255,255,.6);direction:rtl;text-align:right;line-height:1.6;
}

/* ── NAV BUTTONS (right side) ── */
#nav-btns{
  position:fixed;bottom:148px;right:16px;z-index:30;
  display:flex;flex-direction:column;gap:8px;
}
.nav-btn{
  width:50px;height:50px;border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  color:#fff;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.nav-btn:hover{background:rgba(212,168,67,.25);border-color:var(--gold);}
.nav-btn:disabled{opacity:.2;cursor:default;}
.nav-next{
  width:54px;height:54px;font-size:1.4rem;
  background:linear-gradient(135deg,var(--green2),var(--green));
  border-color:rgba(212,168,67,.4);
}

/* ── THUMBNAIL STRIP ── */
#strip-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:linear-gradient(to top,rgba(0,0,0,.92) 70%,transparent 100%);
  padding:8px 12px 10px;
}
#strip{
  display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;scroll-snap-type:x mandatory;
}
#strip::-webkit-scrollbar{display:none;}
.thumb{
  flex-shrink:0;width:78px;border-radius:8px;overflow:hidden;
  cursor:pointer;border:2px solid transparent;
  transition:all .2s;background:#111;position:relative;
  scroll-snap-align:start;
}
.thumb.active{border-color:var(--gold);}
.thumb:hover{transform:translateY(-3px);}
.thumb-img{width:100%;height:50px;object-fit:cover;display:block;}
.thumb-n{
  position:absolute;top:2px;left:3px;
  background:rgba(0,0,0,.65);color:#fff;
  font-size:9px;border-radius:3px;padding:1px 4px;font-family:monospace;
}
.thumb-lbl{
  padding:3px 4px;font-size:9px;
  color:rgba(255,255,255,.6);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'Amiri',serif;direction:rtl;
}
.thumb.active .thumb-lbl{color:var(--gold2);}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;z-index:200;
  background:radial-gradient(ellipse at center,#0d2a1a 0%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s ease;
}
#loader.out{opacity:0;pointer-events:none;}
.ld-icon{font-size:5rem;animation:fl 2s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.ld-title{font-family:'Amiri',serif;font-size:1.8rem;color:var(--gold2);margin:12px 0 4px;text-align:center;}
.ld-sub{color:rgba(255,255,255,.4);font-size:.8rem;letter-spacing:.1em;}
.ld-bar{width:160px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:16px;overflow:hidden;}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--green2),var(--gold));border-radius:2px;animation:ld 2.5s ease-out forwards;}
@keyframes ld{from{width:0}to{width:100%}}

/* ── COMPLETION SCREEN ── */
#complete{
  display:none;position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 55%,rgba(45,107,78,.5) 0%,rgba(0,0,0,.96) 65%);
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;
}
#complete.show{display:flex;}
.cp-icon{font-size:5rem;animation:fl 3s ease-in-out infinite;}
.cp-title{font-family:'Amiri',serif;font-size:2.8rem;color:var(--gold2);margin:.5rem 0;}
.cp-msg{
  font-family:'Noto Nastaliq Urdu',serif;font-size:1.1rem;
  color:rgba(255,255,255,.8);max-width:420px;line-height:2;
  direction:rtl;text-align:center;margin:1rem 0;
}
.cp-dua{font-family:'Amiri',serif;font-size:1.3rem;color:var(--gold);margin:.5rem 0;line-height:2;}
.cp-btns{display:flex;gap:12px;margin-top:1.5rem;flex-wrap:wrap;justify-content:center;}
.cbtn{padding:.75rem 1.6rem;border-radius:30px;font-size:.9rem;cursor:pointer;text-decoration:none;transition:all .25s;}
.cbtn:hover{transform:scale(1.04);}
.cbtn-p{background:linear-gradient(135deg,var(--green2),var(--green));color:var(--gold2);border:1px solid rgba(212,168,67,.4);}
.cbtn-s{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);}

/* ── DRAG HINT ── */
#drag-hint{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:40;
  background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.2);
  border-radius:24px;padding:8px 20px;
  color:rgba(255,255,255,.8);font-size:13px;letter-spacing:.04em;
  pointer-events:none;transition:opacity .8s;text-align:center;
  animation:hint-pulse 2s ease-in-out infinite;
}
@keyframes hint-pulse{0%,100%{opacity:.9}50%{opacity:.5}}
#drag-hint.hide{opacity:0;}

/* ── FLOOR HOTSPOT (blinking nav dot) ── */
.pnlm-hotspot.hs-floor {
  width: 52px !important;
  height: 52px !important;
  margin: -26px 0 0 -26px !important;
  background: transparent !important;
  border: none !important;
  cursor: pointer !important;
}
.pnlm-hotspot.hs-floor::after { display:none !important; }
.hs-dot {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.95) 30%, rgba(212,168,67,.5) 70%, transparent 100%);
  box-shadow: 0 0 18px 8px rgba(255,255,255,.5), 0 0 40px 16px rgba(212,168,67,.3);
  animation: hs-pulse 1.6s ease-in-out infinite;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1;
  position: relative;
}
.hs-dot::before {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.35);
  animation: hs-ring 1.6s ease-in-out infinite;
}
@keyframes hs-pulse {
  0%,100% { transform: scale(1);   opacity: 1;   box-shadow: 0 0 18px 8px rgba(255,255,255,.5), 0 0 40px 16px rgba(212,168,67,.3); }
  50%      { transform: scale(1.2); opacity: .75; box-shadow: 0 0 30px 14px rgba(255,255,255,.7), 0 0 60px 24px rgba(212,168,67,.5); }
}
@keyframes hs-ring {
  0%,100% { transform: scale(1);   opacity: .6; }
  50%      { transform: scale(1.4); opacity: 0;  }
}
.hs-label {
  position: absolute;
  bottom: -26px;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  background: rgba(0,0,0,.7);
  color: #fff;
  font-size: 11px;
  font-family: 'Amiri', serif;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.2);
  pointer-events: none;
  opacity: 0;
  transition: opacity .2s;
}
.pnlm-hotspot.hs-floor:hover .hs-label { opacity: 1; }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-icon" id="ldIcon">🕋</div>
  <div class="ld-title" id="ldTitle">لوڈ ہو رہا ہے...</div>
  <div class="ld-sub">VIRTUAL SACRED TOUR • 360°</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- 360° PANORAMA VIEWER (Pannellum) -->
<div id="panorama-viewer"></div>

<!-- DRAG HINT -->
<div id="drag-hint">🔄 &nbsp; Mouse se chaaro taraf ghumaain &nbsp; 🔄<br>
<small style="opacity:.6">← Drag → &nbsp;|&nbsp; ↑ Upar bhi dekh sakte hain ↓</small></div>

<!-- TOP HUD -->
<div id="top-hud">
  <div class="hud-left">
    <div class="hud-badge">🔄 360° &nbsp;|&nbsp; <em id="hudStep">1/12</em></div>
    <div class="hud-title" id="hudTitle"></div>
  </div>
  <div class="hud-right">
    <a href="/" class="hud-btn">🏠</a>
    <button class="hud-btn" onclick="toggleFullscreen()">⛶</button>
    <button class="hud-btn" onclick="toggleInfo()">☰</button>
  </div>
</div>

<!-- INFO CARD -->
<div id="info-card">
  <div class="ic-header">
    <div><div class="ic-badge" id="icBadge">Step 1</div></div>
    <button class="ic-toggle" onclick="toggleInfo()">✕</button>
  </div>
  <div class="ic-body">
    <div class="ic-icon" id="icIcon">🕌</div>
    <div class="ic-arabic" id="icArabic"></div>
    <div class="ic-urdu"   id="icUrdu"></div>
    <div class="ic-divider"></div>
    <div class="ic-dua-label">🤲 دعا</div>
    <div class="ic-dua"     id="icDua"></div>
    <div class="ic-meaning" id="icMeaning"></div>
    <div class="ic-tip"     id="icTip"></div>
  </div>
</div>

<!-- NAV BUTTONS -->
<div id="nav-btns">
  <button class="nav-btn nav-next" id="btnNext" onclick="nextStep()">➡</button>
  <button class="nav-btn"          id="btnPrev" onclick="prevStep()">⬅</button>
</div>

<!-- THUMBNAIL STRIP -->
<div id="strip-wrap">
  <div id="strip"></div>
</div>

<!-- COMPLETION -->
<div id="complete">
  <div class="cp-icon">🎉</div>
  <div class="cp-title">مبارک ہو!</div>
  <div class="cp-msg" id="cpMsg"></div>
  <div class="cp-dua" id="cpDua"></div>
  <div class="cp-btns">
    <button class="cbtn cbtn-p" onclick="restartTour()">🔄 دوبارہ</button>
    <a href="/" class="cbtn cbtn-s">🏠 ہوم</a>
    <a id="otherBtn" href="#" class="cbtn cbtn-s"></a>
  </div>
</div>

<script>
// ── URL params ──────────────────────────────────────────────
const urlP     = new URLSearchParams(location.search);
const tourType = urlP.get('type') === 'madina' ? 'madina' : 'makkah';
const other    = tourType === 'makkah' ? 'madina' : 'makkah';

document.getElementById('ldIcon').textContent  = tourType === 'makkah' ? '🕋' : '🌿';
document.getElementById('ldTitle').textContent = tourType === 'makkah' ? 'مکہ مکرمہ — عمرہ ٹور' : 'مدینہ منورہ ٹور';
document.getElementById('otherBtn').href        = `/tour?type=${other}`;
document.getElementById('otherBtn').textContent = tourType === 'makkah' ? '🌿 مدینہ' : '🕋 مکہ';

// ── State ───────────────────────────────────────────────────
let tourData    = [];
let currentStep = 0;
let viewer      = null;
let infoVisible = true;
let hintShown   = true;
let hintTimer;

// ── Init Pannellum viewer ────────────────────────────────────
let loaderHidden = false;
function hideLoader() {
  if (loaderHidden) return;
  loaderHidden = true;
  document.getElementById('loader').classList.add('out');
}

function initViewer(panoramaUrl, yaw, pitch, hfov, hasNext) {
  if (viewer) {
    try { viewer.destroy(); } catch(e) {}
    viewer = null;
    document.getElementById('panorama-viewer').innerHTML = '';
  }

  // Fallback: hide loader after 4s no matter what
  setTimeout(hideLoader, 4000);

  // Build floor hotspot for next-step navigation
  const hotSpots = [];
  if (hasNext) {
    hotSpots.push({
      pitch:            -22,
      yaw:              0,
      type:             'info',
      cssClass:         'hs-floor',
      createTooltipFunc: createFloorHotspot,
      clickHandlerFunc: function() { nextStep(); }
    });
  }

  viewer = pannellum.viewer('panorama-viewer', {
    type:        'equirectangular',
    panorama:    panoramaUrl,
    autoLoad:    true,
    autoRotate:  -2,
    autoRotateInactivityDelay: 3000,
    compass:     false,
    showControls:false,
    keyboardZoom:false,
    mouseZoom:   true,
    hfov:        hfov  || 110,
    minHfov:     60,
    maxHfov:     120,
    yaw:         yaw   || 0,
    pitch:       pitch || 0,
    friction:    0.5,
    hotSpots:    hotSpots,
    onLoad:      hideLoader,
    onError:     function(err) {
      console.warn('Pannellum error:', err);
      hideLoader();
    }
  });
}

function createFloorHotspot(hotSpotDiv, args) {
  const dot = document.createElement('div');
  dot.className = 'hs-dot';
  dot.innerHTML = '➡';
  const lbl = document.createElement('div');
  lbl.className = 'hs-label';
  lbl.textContent = 'اگلا قدم';
  dot.appendChild(lbl);
  hotSpotDiv.appendChild(dot);
}

// ── Load a scene ─────────────────────────────────────────────
function loadScene(idx, animate) {
  if (idx < 0 || idx >= tourData.length) return;
  currentStep = idx;
  const step  = tourData[idx];
  const hasNext = idx < tourData.length - 1;

  initViewer(step.panorama, step.yaw, step.pitch, step.hfov, hasNext);
  updateUI(step, idx);
}

// ── Update UI ─────────────────────────────────────────────────
function updateUI(step, idx) {
  document.getElementById('hudStep').textContent   = `${idx+1}/${tourData.length}`;
  document.getElementById('hudTitle').textContent  = step.title || '';
  document.getElementById('icBadge').textContent   = step.badge || `قدم ${idx+1}`;
  document.getElementById('icIcon').textContent    = step.icon  || '🕌';
  document.getElementById('icArabic').textContent  = step.title || '';
  document.getElementById('icUrdu').textContent    = step.instruction || '';
  document.getElementById('icDua').textContent     = step.arabicDua  || '';
  document.getElementById('icMeaning').textContent = step.duaMeaning || '';
  document.getElementById('icTip').textContent     = step.tip        || '';

  document.getElementById('btnNext').textContent  = idx === tourData.length - 1 ? '✅' : '➡';
  document.getElementById('btnPrev').disabled     = idx === 0;
  updateStrip(idx);
}

// ── Navigation ────────────────────────────────────────────────
function nextStep() {
  if (currentStep >= tourData.length - 1) { showComplete(); return; }
  loadScene(currentStep + 1);
}
function prevStep() {
  if (currentStep > 0) loadScene(currentStep - 1);
}
function restartTour() {
  document.getElementById('complete').classList.remove('show');
  loadScene(0);
}
function showComplete() {
  const s = tourData[tourData.length - 1];
  document.getElementById('cpMsg').textContent = s.instruction || 'مبارک!';
  document.getElementById('cpDua').textContent = s.arabicDua   || '';
  document.getElementById('complete').classList.add('show');
}

// ── Thumbnail strip ───────────────────────────────────────────
function buildStrip() {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  tourData.forEach((step, i) => {
    const t   = document.createElement('div');
    t.className = 'thumb';
    t.id = `th-${i}`;
    const src = step.panorama.replace('_pano.jpg','.jpg').replace('_pano.jpeg','.jpeg');
    t.innerHTML = `
      <div class="thumb-n">${i+1}</div>
      <img class="thumb-img" src="${src}" onerror="this.src='${step.panorama}'" loading="lazy">
      <div class="thumb-lbl">${step.icon||''} ${step.title}</div>
    `;
    t.onclick = () => loadScene(i);
    strip.appendChild(t);
  });
}
function updateStrip(idx) {
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===idx));
  const active = document.getElementById(`th-${idx}`);
  if (active) active.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

// ── Helpers ───────────────────────────────────────────────────
function toggleInfo() {
  infoVisible = !infoVisible;
  document.getElementById('info-card').classList.toggle('hidden', !infoVisible);
}
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}
function hideHint() {
  if (!hintShown) return;
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    document.getElementById('drag-hint').classList.add('hide');
    hintShown = false;
  }, 2000);
}
setTimeout(hideHint, 4000);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'n') nextStep();
  if (e.key === 'ArrowLeft'  || e.key === 'p') prevStep();
  if (e.key === 'Escape')   toggleInfo();
});

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch('/api/tour');
    const data = await res.json();
    tourData   = data[tourType] || [];

    if (!tourData.length) { alert('Tour data not found!'); return; }

    buildStrip();
    loadScene(0);

  } catch(err) {
    console.error('Init error:', err);
    document.getElementById('ldTitle').textContent = 'ایرر: ' + err.message;
  }
}

init();
</script>
</body>
</html>
